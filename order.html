<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Online | Bait Ul Broast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#FFD700', secondary: '#CCFF00', bgDark: '#000000', cardDark: '#1a1a1a' } } }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="main.css">
</head>

<body class="bg-black text-white">

    <!-- Sidebar Overlay -->
    <div id="sidebar" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-xl" onclick="closeSidebar()"></div>
        <div class="absolute left-0 top-0 bottom-0 w-80 bg-black border-r border-white/10 p-8 flex flex-col">
            <div class="flex justify-between items-center mb-12">
                <span class="text-2xl font-bebas tracking-tighter text-primary">BAIT UL BROAST</span>
                <button onclick="closeSidebar()" class="text-primary hover:text-secondary transition-colors">
                    <i data-lucide="x" class="w-8 h-8"></i>
                </button>
            </div>
            <nav class="flex flex-col gap-6">
                <a href="index.html" class="text-4xl font-bebas hover:text-primary transition-colors">HOME</a>
                <a href="menu.html" class="text-4xl font-bebas hover:text-primary transition-colors">MENU</a>
                <a href="about.html" class="text-4xl font-bebas hover:text-primary transition-colors">STORY</a>
                <a href="locations.html" class="text-4xl font-bebas hover:text-primary transition-colors">FIND US</a>
                <a href="contact.html" class="text-4xl font-bebas hover:text-primary transition-colors">CONTACT</a>
            </nav>
            <div class="mt-auto">
                <a href="order.html" class="block w-full py-4 bg-primary text-black font-extrabold rounded-full text-center hover:bg-secondary transition-all">
                    ORDER NOW
                </a>
            </div>
        </div>
    </div>

    <nav class="fixed top-0 w-full z-50 glass py-4 px-6 md:px-12 flex justify-between items-center">
        <button onclick="openSidebar()" class="text-primary hover:text-secondary transition-colors">
            <i data-lucide="menu" class="w-8 h-8"></i>
        </button>

        <a href="index.html" class="flex items-center gap-2">
            <span class="text-2xl font-bebas tracking-tighter text-primary">BAIT UL BROAST</span>
        </a>
        <a href="menu.html"
            class="text-xs font-black tracking-widest border border-white/20 px-6 py-2 rounded-full hover:bg-white hover:text-black transition-all">BACK
            TO MENU</a>
    </nav>

    <main class="pt-32 pb-20 px-6 md:px-12 max-w-7xl mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">

            <!-- Left: Checkout Form -->
            <div class="lg:col-span-2 space-y-8">
                <section class="glass p-8 rounded-3xl">
                    <h2 class="text-4xl font-bebas mb-6 flex items-center gap-3">
                        <i data-lucide="truck" class="text-primary w-8 h-8"></i> DELIVERY DETAILS
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold tracking-widest text-gray-400">FULL NAME</label>
                            <input type="text"
                                class="w-full bg-black border border-white/10 p-4 rounded-xl outline-none focus:border-primary transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold tracking-widest text-gray-400">PHONE NUMBER</label>
                            <input type="tel"
                                class="w-full bg-black border border-white/10 p-4 rounded-xl outline-none focus:border-primary transition-all">
                        </div>
                        <div class="md:col-span-2 space-y-2">
                            <label class="text-[10px] font-bold tracking-widest text-gray-400">DELIVERY ADDRESS</label>
                            <textarea
                                class="w-full bg-black border border-white/10 p-4 rounded-xl outline-none focus:border-primary transition-all h-24"></textarea>
                        </div>
                    </div>
                </section>

                <section class="glass p-8 rounded-3xl">
                    <h2 class="text-4xl font-bebas mb-6 flex items-center gap-3">
                        <i data-lucide="credit-card" class="text-primary w-8 h-8"></i> PAYMENT METHOD
                    </h2>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                        <button class="p-6 border-2 border-primary bg-primary/10 rounded-2xl text-center">
                            <i data-lucide="banknote" class="w-8 h-8 mx-auto mb-2"></i>
                            <span class="text-[10px] font-black tracking-widest">CASH ON DELIVERY</span>
                        </button>
                        <button
                            class="p-6 border-2 border-white/10 hover:border-primary transition-all rounded-2xl text-center">
                            <i data-lucide="smartphone" class="w-8 h-8 mx-auto mb-2"></i>
                            <span class="text-[10px] font-black tracking-widest">DIGITAL WALLET</span>
                        </button>
                    </div>
                </section>
            </div>

            <!-- Right: Order Summary -->
            <div class="lg:col-span-1">
                <div class="glass p-8 rounded-3xl sticky top-32">
                    <h2 class="text-4xl font-bebas mb-6">ORDER SUMMARY</h2>
                    <div id="cart-items" class="space-y-4 mb-8 max-h-96 overflow-y-auto pr-2">
                        <!-- Items Injected -->
                    </div>

                    <div class="border-t border-white/10 pt-6 space-y-3 mb-8">
                        <div class="flex justify-between text-gray-400 text-sm">
                            <span>Subtotal</span>
                            <span id="summary-subtotal">Rs. 0</span>
                        </div>
                        <div class="flex justify-between text-gray-400 text-sm">
                            <span>Delivery</span>
                            <span class="text-secondary">FREE</span>
                        </div>
                        <div class="flex justify-between text-2xl font-bebas pt-2 text-primary">
                            <span>Total</span>
                            <span id="summary-total">Rs. 0</span>
                        </div>
                    </div>

                    <button onclick="placeOrder()"
                        class="w-full py-5 bg-primary text-black font-black text-xs tracking-[0.3em] rounded-full hover:bg-secondary transition-all shadow-[0_0_30px_rgba(255,215,0,0.2)]">
                        PLACE ORDER 🔥
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Success Screen (Hidden) -->
    <div id="success-screen" class="fixed inset-0 z-[200] hidden flex items-center justify-center p-6 bg-black">
        <div class="text-center max-w-xl">
            <div class="w-32 h-32 bg-primary rounded-full mx-auto mb-8 flex items-center justify-center mascot-float">
                <i data-lucide="check-circle" class="w-16 h-16 text-black"></i>
            </div>
            <h1 class="text-7xl font-bebas mb-4 text-primary">ORDER PLACED!</h1>
            <p class="text-gray-400 italic mb-12">The chicken is being prepped. Get ready for the vibez.</p>

            <div class="glass p-8 rounded-3xl text-left space-y-6 mb-12">
                <div class="flex items-center gap-4">
                    <div class="w-3 h-3 bg-secondary rounded-full animate-ping"></div>
                    <span class="text-xs font-black tracking-widest">ORDER STATUS: PREPARING YOUR FEAST</span>
                </div>
                <!-- Mini Progress Tracker -->
                <div class="h-2 bg-white/10 rounded-full overflow-hidden">
                    <div class="h-full bg-primary w-1/4 transition-all duration-[3000ms]" id="progress-bar"></div>
                </div>
            </div>

            <a href="index.html"
                class="px-10 py-4 border-2 border-primary text-primary font-black text-xs tracking-widest rounded-full hover:bg-primary hover:text-black transition-all">
                BACK TO HOME
            </a>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        function renderCartSummary() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const container = document.getElementById('cart-items');

            if (cart.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 italic py-8">Your bag is empty, bestie.</p>';
                document.getElementById('summary-subtotal').textContent = 'Rs. 0';
                document.getElementById('summary-total').textContent = 'Rs. 0';
                return;
            }

            container.innerHTML = cart.map((item, index) => `
                <div class="flex justify-between items-center group">
                    <div class="flex items-center gap-4">
                        <div class="w-16 h-16 bg-gray-900 rounded-xl overflow-hidden">
                            <img src="${item.img}" class="w-full h-full object-cover">
                        </div>
                        <div>
                            <h4 class="font-bold text-sm text-balance">${item.name}</h4>
                            <p class="text-[10px] text-primary font-black">X${item.quantity}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-black">Rs. ${(item.price * item.quantity).toFixed(0)}</p>
                        <button onclick="removeItem(${index})" class="text-[8px] text-gray-600 hover:text-red-500 font-bold tracking-widest uppercase mt-1">REMOVE</button>
                    </div>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('summary-subtotal').textContent = `Rs. ${total.toFixed(0)}`;
            document.getElementById('summary-total').textContent = `Rs. ${total.toFixed(0)}`;
        }

        function removeItem(index) {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCartSummary();
            updateCartBadge();
        }

        function placeOrder() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            if (cart.length === 0) return alert('Your cart is empty!');

            document.getElementById('success-screen').classList.remove('hidden');
            localStorage.removeItem('cart');
            updateCartBadge();

            // Simulating progress
            setTimeout(() => {
                document.getElementById('progress-bar').style.width = '60%';
            }, 1000);
        }

        renderCartSummary();
        lucide.createIcons();

        function openSidebar() {
            document.getElementById('sidebar').classList.remove('hidden');
            gsap.from('#sidebar .bg-black', { x: '-100%', duration: 0.5, ease: 'power3.out' });
            lucide.createIcons();
        }

        function closeSidebar() {
            gsap.to('#sidebar .bg-black', {
                x: '-100%',
                duration: 0.3,
                onComplete: () => {
                    document.getElementById('sidebar').classList.add('hidden');
                }
            });
        }
    </script>
</body>

</html>
